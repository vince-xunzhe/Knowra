# Knowra cloud backend on Fly.io
# Run mode: KNOWRA_DEPLOY_MODE=cloud (see backend/main.py — that flag
# decides which routers + DB engine to mount).

app = 'knowra-cloud'
primary_region = 'nrt'

[build]
  dockerfile = 'backend/Dockerfile'

[env]
  KNOWRA_DEPLOY_MODE = 'cloud'
  PORT = '8000'

[http_service]
  internal_port = 8000
  force_https = true
  # Keep ONE machine always running. Earlier we used auto-stop +
  # min_machines_running=0 to save ~$3/mo, but that meant the first
  # request after idle hit a cold-starting machine: the CORS preflight
  # (OPTIONS) got a 503 from the Fly proxy with no Access-Control
  # headers, which the browser reports as a CORS failure ("Response to
  # preflight request doesn't pass access control check"). For a single
  # user syncing intermittently from across the Pacific, cold starts
  # were the #1 source of flaky "Network Error" / CORS failures. An
  # always-on shared-cpu-1x machine is ~$5/mo and removes the whole
  # class of failures.
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  # Generous concurrency — one user, but a sync fans out many parallel
  # signed-URL + PUT requests. Defaults (25 hard) are fine, set
  # explicitly so a burst of uploads doesn't get soft-throttled.
  [http_service.concurrency]
    type = 'requests'
    soft_limit = 200
    hard_limit = 250

[checks]
  # TCP check instead of HTTP: just confirms uvicorn is accepting
  # connections on 8000. The previous HTTP check against /api/cloud/me
  # contributed to deploy health-check timeouts because the route does
  # real work (JWT verifier init, DB touch). A plain TCP connect is the
  # right liveness signal — "is the server listening" — and never
  # 5xx-flaps the deploy.
  [checks.tcp]
    type = 'tcp'
    interval = '15s'
    timeout = '5s'
    grace_period = '30s'
    port = 8000

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
